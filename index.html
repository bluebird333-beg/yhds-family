<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YHDS FAMILY</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --primary: #2d6a4f;
  --primary-light: #e8f5ee;
  --primary-mid: #40916c;
  --accent: #f4a261;
  --accent-light: #fff3e8;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --border: #e5e7eb;
  --bg: #ffffff;
  --bg2: #f9fafb;
  --radius: 12px;
  --radius-sm: 8px;
}
body { font-family: -apple-system, 'Segoe UI', sans-serif; color: var(--text); background: var(--bg2); min-height: 100vh; }

/* NAV */
.top-nav { background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.top-nav-inner { max-width: 680px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 52px; padding: 0 16px; }
.nav-logo { font-size: 17px; font-weight: 800; color: var(--primary); letter-spacing: 1px; }
.nav-user { display: flex; align-items: center; gap: 8px; }
.user-chip { font-size: 13px; color: var(--text-muted); background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; cursor: pointer; }
.logout-btn { font-size: 12px; color: var(--text-muted); cursor: pointer; background: none; border: none; }

/* LOGIN */
.login-wrap { max-width: 360px; margin: 60px auto; padding: 0 20px; }
.login-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px 28px; text-align: center; }
.login-logo { font-size: 48px; margin-bottom: 12px; }
.login-title { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
.login-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
.login-card input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; margin-bottom: 10px; outline: none; }
.login-card input:focus { border-color: var(--primary); }
.btn-primary { width: 100%; padding: 13px; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-primary:active { opacity: 0.85; }
.login-hint { font-size: 12px; color: var(--text-muted); margin-top: 16px; line-height: 1.6; }

/* CATEGORY TABS */
.cat-tabs { background: var(--bg); border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tabs-inner { display: inline-flex; padding: 0 12px; max-width: 100%; }
.cat-tab { display: inline-block; padding: 12px 14px; font-size: 13px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; font-weight: 500; }
.cat-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

/* MAIN */
.main { max-width: 680px; margin: 0 auto; padding: 16px 12px 100px; }

/* WRITE BOX */
.write-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px; }
.write-box textarea { width: 100%; border: none; outline: none; font-size: 15px; resize: none; min-height: 60px; font-family: inherit; color: var(--text); background: transparent; }
.write-box-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.write-cat-select { font-size: 13px; border: 1px solid var(--border); border-radius: 20px; padding: 5px 10px; color: var(--text-muted); background: var(--bg2); outline: none; }
.write-submit { background: var(--primary); color: white; border: none; border-radius: 20px; padding: 7px 18px; font-size: 13px; font-weight: 700; cursor: pointer; }
.write-submit:active { opacity: 0.85; }

/* POST CARD */
.post-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.post-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px 10px; }
.avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; flex-shrink: 0; }
.post-meta { flex: 1; }
.post-author { font-size: 14px; font-weight: 700; }
.post-info { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.cat-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--primary-light); color: var(--primary); font-weight: 700; margin-left: 6px; }
.post-body { padding: 0 16px 14px; font-size: 15px; line-height: 1.65; white-space: pre-wrap; }
.post-actions { display: flex; align-items: center; gap: 0; border-top: 1px solid var(--border); }
.action-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; font-size: 13px; color: var(--text-muted); cursor: pointer; background: none; border: none; border-right: 1px solid var(--border); font-family: inherit; }
.action-btn:last-child { border-right: none; }
.action-btn:active { background: var(--bg2); }
.action-btn.liked { color: #e74c3c; }

/* COMMENTS */
.comments-wrap { border-top: 1px solid var(--border); background: var(--bg2); padding: 10px 14px; display: none; }
.comments-wrap.open { display: block; }
.comment-item { display: flex; gap: 8px; margin-bottom: 10px; }
.comment-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
.comment-body { flex: 1; }
.comment-author { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.comment-text { font-size: 13px; line-height: 1.5; }
.comment-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.comment-input-row { display: flex; gap: 8px; margin-top: 10px; }
.comment-input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; outline: none; font-family: inherit; background: var(--bg); }
.comment-input:focus { border-color: var(--primary); }
.comment-send { background: var(--primary); color: white; border: none; border-radius: 20px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; }

/* EMPTY */
.empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty-state div { font-size: 36px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; }

/* BOTTOM NAV */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 8px 0 env(safe-area-inset-bottom, 8px); z-index: 100; }
.bn-item { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; background: none; border: none; padding: 4px 8px; }
.bn-icon { font-size: 22px; }
.bn-label { font-size: 10px; color: var(--text-muted); }
.bn-item.active .bn-label { color: var(--primary); font-weight: 700; }

/* LOADING */
.loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }

/* TOAST */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* Avatar colors */
.av-green { background: #e8f5ee; color: #2d6a4f; }
.av-orange { background: #fff3e8; color: #e76f00; }
.av-blue { background: #e8f0fe; color: #1a56db; }
.av-pink { background: #fce8f3; color: #c026d3; }
.av-red { background: #fee8e8; color: #dc2626; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">🏠</div>
      <div class="login-title">YHDS FAMILY</div>
      <div class="login-sub">우리 가족만의 공간에 오신 걸 환영해요 ❤️</div>
      <input type="text" id="login-name" placeholder="이름 입력 (예: 아빠, 엄마, 딸, 아들)" maxlength="10">
      <input type="password" id="login-pw" placeholder="가족 비밀번호">
      <button class="btn-primary" onclick="doLogin()">입장하기</button>
      <div class="login-hint">💡 처음 오셨으면 이름을 입력하고 입장하세요!</div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div class="top-nav">
    <div class="top-nav-inner">
      <div class="nav-logo">🏠 YHDS</div>
      <div class="nav-user">
        <div class="user-chip" id="user-chip">👤 이름</div>
        <button class="logout-btn" onclick="doLogout()">로그아웃</button>
      </div>
    </div>
  </div>

  <div class="cat-tabs">
    <div class="cat-tabs-inner">
      <div class="cat-tab active" onclick="selectCat('전체')">🏠 전체</div>
      <div class="cat-tab" onclick="selectCat('소통')">💬 소통</div>
      <div class="cat-tab" onclick="selectCat('요리')">🍳 요리</div>
      <div class="cat-tab" onclick="selectCat('여행')">✈️ 여행</div>
      <div class="cat-tab" onclick="selectCat('영어')">📖 영어</div>
      <div class="cat-tab" onclick="selectCat('일정')">📅 일정</div>
      <div class="cat-tab" onclick="selectCat('기념일')">🎂 기념일</div>
      <div class="cat-tab" onclick="selectCat('챌린지')">🏆 챌린지</div>
      <div class="cat-tab" onclick="selectCat('독서')">📚 독서</div>
      <div class="cat-tab" onclick="selectCat('감사일기')">🙏 감사일기</div>
    </div>
  </div>

  <div class="main">
    <!-- WRITE -->
    <div class="write-box">
      <textarea id="write-text" placeholder="가족에게 하고 싶은 말을 남겨보세요 😊"></textarea>
      <div class="write-box-footer">
        <select class="write-cat-select" id="write-cat">
          <option>소통</option>
          <option>요리</option>
          <option>여행</option>
          <option>영어</option>
          <option>일정</option>
          <option>기념일</option>
          <option>챌린지</option>
          <option>독서</option>
          <option>감사일기</option>
        </select>
        <button class="write-submit" onclick="submitPost()">올리기 ✈️</button>
      </div>
    </div>

    <!-- POSTS -->
    <div id="posts-list"><div class="loading">불러오는 중... ⏳</div></div>
  </div>

  <div class="bottom-nav">
    <button class="bn-item active" onclick="selectCat('전체')"><div class="bn-icon">🏠</div><div class="bn-label">전체</div></button>
    <button class="bn-item" onclick="selectCat('소통')"><div class="bn-icon">💬</div><div class="bn-label">소통</div></button>
    <button class="bn-item" onclick="selectCat('요리')"><div class="bn-icon">🍳</div><div class="bn-label">요리</div></button>
    <button class="bn-item" onclick="selectCat('영어')"><div class="bn-icon">📖</div><div class="bn-label">영어</div></button>
    <button class="bn-item" onclick="selectCat('감사일기')"><div class="bn-icon">🙏</div><div class="bn-label">감사</div></button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, arrayUnion, arrayRemove, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyABdaB9U87q1wZJYYBsRbSmYHaqrdMhT5w",
  authDomain: "yhds-family.firebaseapp.com",
  projectId: "yhds-family",
  storageBucket: "yhds-family.firebasestorage.app",
  messagingSenderId: "900368479728",
  appId: "1:900368479728:web:e507687308781052721935",
  measurementId: "G-ECHZL3V44V"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const FAMILY_PW = "yhds1029";
let currentUser = null;
let currentCat = "전체";
let unsubscribe = null;

const avatarColors = ["av-green","av-orange","av-blue","av-pink","av-red"];
function getAvatarColor(name) {
  let h = 0;
  for(let c of name) h += c.charCodeAt(0);
  return avatarColors[h % avatarColors.length];
}
function getInitial(name) { return name.charAt(0); }

function timeAgo(ts) {
  if(!ts) return "";
  const now = Date.now();
  const t = ts.toMillis ? ts.toMillis() : ts;
  const diff = Math.floor((now - t) / 1000);
  if(diff < 60) return "방금";
  if(diff < 3600) return Math.floor(diff/60) + "분 전";
  if(diff < 86400) return Math.floor(diff/3600) + "시간 전";
  return Math.floor(diff/86400) + "일 전";
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

// LOGIN
window.doLogin = function() {
  const name = document.getElementById("login-name").value.trim();
  const pw = document.getElementById("login-pw").value;
  if(!name) { showToast("이름을 입력해주세요!"); return; }
  if(pw !== FAMILY_PW) { showToast("비밀번호가 틀렸어요!"); return; }
  currentUser = name;
  localStorage.setItem("yhds_user", name);
  showApp();
};

window.doLogout = function() {
  localStorage.removeItem("yhds_user");
  currentUser = null;
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "block";
};

document.getElementById("login-pw").addEventListener("keydown", e => {
  if(e.key === "Enter") window.doLogin();
});

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("user-chip").textContent = "👤 " + currentUser;
  loadPosts();
}

// Check saved login
const saved = localStorage.getItem("yhds_user");
if(saved) { currentUser = saved; showApp(); }

// CATEGORY
window.selectCat = function(cat) {
  currentCat = cat;
  document.querySelectorAll(".cat-tab").forEach(t => {
    t.classList.toggle("active", t.textContent.includes(cat) || (cat === "전체" && t.textContent.includes("전체")));
  });
  document.querySelectorAll(".bn-item").forEach(t => {
    t.classList.toggle("active", t.querySelector(".bn-label").textContent === cat || (cat === "전체" && t.querySelector(".bn-label").textContent === "전체"));
  });
  loadPosts();
};

// LOAD POSTS
function loadPosts() {
  const list = document.getElementById("posts-list");
  list.innerHTML = '<div class="loading">불러오는 중... ⏳</div>';
  if(unsubscribe) unsubscribe();
  const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
  unsubscribe = onSnapshot(q, (snapshot) => {
    let posts = [];
    snapshot.forEach(d => posts.push({ id: d.id, ...d.data() }));
    if(currentCat !== "전체") posts = posts.filter(p => p.category === currentCat);
    if(posts.length === 0) {
      list.innerHTML = '<div class="empty-state"><div>📭</div><p>아직 글이 없어요.<br>첫 번째 글을 올려보세요!</p></div>';
      return;
    }
    list.innerHTML = posts.map(p => renderPost(p)).join("");
  });
}

function renderPost(p) {
  const ac = getAvatarColor(p.author || "?");
  const ini = getInitial(p.author || "?");
  const liked = (p.likes || []).includes(currentUser);
  const likeCount = (p.likes || []).length;
  const commentCount = (p.comments || []).length;
  const comments = (p.comments || []).map(c => `
    <div class="comment-item">
      <div class="comment-avatar ${getAvatarColor(c.author)}">${getInitial(c.author)}</div>
      <div class="comment-body">
        <div class="comment-author">${c.author}</div>
        <div class="comment-text">${c.text}</div>
        <div class="comment-time">${timeAgo(c.createdAt)}</div>
      </div>
    </div>`).join("");
  return `
  <div class="post-card" id="post-${p.id}">
    <div class="post-header">
      <div class="avatar ${ac}">${ini}</div>
      <div class="post-meta">
        <div class="post-author">${p.author}<span class="cat-badge">${p.category}</span></div>
        <div class="post-info">${timeAgo(p.createdAt)}</div>
      </div>
    </div>
    <div class="post-body">${p.content}</div>
    <div class="post-actions">
      <button class="action-btn ${liked ? 'liked' : ''}" onclick="toggleLike('${p.id}')">
        ${liked ? '❤️' : '🤍'} ${likeCount > 0 ? likeCount : ''} 좋아요
      </button>
      <button class="action-btn" onclick="toggleComments('${p.id}')">
        💬 ${commentCount > 0 ? commentCount : ''} 댓글
      </button>
    </div>
    <div class="comments-wrap" id="comments-${p.id}">
      <div id="comment-list-${p.id}">${comments}</div>
      <div class="comment-input-row">
        <input class="comment-input" id="cinput-${p.id}" placeholder="댓글 달기..." maxlength="200">
        <button class="comment-send" onclick="submitComment('${p.id}')">전송</button>
      </div>
    </div>
  </div>`;
}

// SUBMIT POST
window.submitPost = function() {
  const text = document.getElementById("write-text").value.trim();
  const cat = document.getElementById("write-cat").value;
  if(!text) { showToast("내용을 입력해주세요!"); return; }
  addDoc(collection(db, "posts"), {
    author: currentUser,
    content: text,
    category: cat,
    likes: [],
    comments: [],
    createdAt: serverTimestamp()
  }).then(() => {
    document.getElementById("write-text").value = "";
    showToast("글이 올라갔어요! 🎉");
  }).catch(() => showToast("오류가 발생했어요. 다시 시도해주세요."));
};

// LIKE
window.toggleLike = function(postId) {
  const ref = doc(db, "posts", postId);
  const postEl = document.getElementById("post-" + postId);
  const btn = postEl.querySelector(".action-btn");
  const liked = btn.classList.contains("liked");
  updateDoc(ref, { likes: liked ? arrayRemove(currentUser) : arrayUnion(currentUser) });
};

// COMMENTS
window.toggleComments = function(postId) {
  const wrap = document.getElementById("comments-" + postId);
  wrap.classList.toggle("open");
  if(wrap.classList.contains("open")) {
    document.getElementById("cinput-" + postId).focus();
  }
};

window.submitComment = function(postId) {
  const input = document.getElementById("cinput-" + postId);
  const text = input.value.trim();
  if(!text) return;
  const ref = doc(db, "posts", postId);
  updateDoc(ref, {
    comments: arrayUnion({
      author: currentUser,
      text: text,
      createdAt: { toMillis: () => Date.now() }
    })
  }).then(() => {
    input.value = "";
    showToast("댓글이 달렸어요! 💬");
  });
};

document.addEventListener("keydown", e => {
  if(e.key === "Enter" && e.target.classList.contains("comment-input")) {
    const postId = e.target.id.replace("cinput-", "");
    window.submitComment(postId);
  }
});
</script>
</body>
</html>
